version: "3.9"

services:
  proxy:
    build: ./nginx
    ports:
      - "443:443"
    depends_on:
      - api
      - ui
    networks:
      - app-network

  api:
    build: ./api
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  ui:
    build: ./ui
    networks:
      - app-network

networks:
  app-network:
    driver: bridge